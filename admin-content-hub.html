<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Content Hub — VR Hotspots Admin</title>
    <link rel="stylesheet" href="admin-nav.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        max-width: 1200px;
      }
      .summary-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .chip {
        background: #e9ecef;
        padding: 6px 12px;
        border-radius: 16px;
        font-size: 13px;
      }
      .filters {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 16px;
      }
      .content-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      .content-table th,
      .content-table td {
        border: 1px solid #dee2e6;
        padding: 8px 10px;
        vertical-align: top;
      }
      .content-table th {
        background: #f8f9fa;
        text-align: left;
      }
      .type-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        background: #dee2e6;
      }
      .type-project { background: #cfe2ff; }
      .type-flat_page { background: #d1e7dd; }
      .type-vr_tour { background: #fff3cd; }
      .type-asset,
      .type-orphan_asset { background: #e2d9f3; }
      .type-legacy_submission { background: #f8d7da; }
      .links a {
        display: block;
        font-size: 12px;
        word-break: break-all;
      }
      .version-row td {
        background: #fafafa;
        font-size: 13px;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 12px;
        margin-right: 4px;
        cursor: pointer;
      }
      .btn-danger {
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 4px;
      }
      .btn-secondary {
        background: #6c757d;
        color: white;
        border: none;
        border-radius: 4px;
      }
      #delete-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      #delete-modal .panel {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 520px;
        width: 90%;
        max-height: 80vh;
        overflow: auto;
      }
      #delete-modal pre {
        background: #f8f9fa;
        padding: 10px;
        font-size: 12px;
        overflow: auto;
        max-height: 200px;
      }
    </style>
    <script src="admin-auth-ui.js"></script>
    <script src="admin-nav.js"></script>
  </head>
  <body>
    <div id="login-root"></div>
    <div id="main-content" style="display: none">
      <nav id="admin-nav" data-active="content"></nav>
      <h1>Content Hub</h1>
      <p style="color: #555; margin-top: 0">
        All student uploads, projects, flat pages, published tours, and orphaned assets.
      </p>

      <div id="summary-chips" class="summary-chips"></div>

      <div class="filters">
        <label
          >Class:
          <select id="filter-class"><option value="">All classes</option></select></label
        >
        <label
          >Student:
          <select id="filter-student"><option value="">All students</option></select></label
        >
        <label
          >Type:
          <select id="filter-type">
            <option value="">All types</option>
            <option value="project">VR Projects</option>
            <option value="flat_page">Flat Pages</option>
            <option value="vr_tour">VR Tour Publishes</option>
            <option value="asset">Assets</option>
            <option value="orphan_asset">Orphaned Assets</option>
            <option value="legacy_submission">Legacy B2</option>
          </select></label
        >
        <label
          ><input type="checkbox" id="filter-orphaned" /> Orphaned only</label
        >
        <label
          >Search: <input type="text" id="filter-q" placeholder="Name, file, URL…" /></label
        >
        <button type="button" id="apply-filters">Apply</button>
      </div>

      <div id="content-list">Loading…</div>
    </div>

    <div id="delete-modal">
      <div class="panel">
        <h3 id="delete-modal-title">Confirm delete</h3>
        <p id="delete-modal-note"></p>
        <pre id="delete-modal-manifest"></pre>
        <div style="margin-top: 16px">
          <button type="button" class="btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
          <button type="button" class="btn-secondary btn-sm" id="delete-cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <script src="admin-content-hub.js"></script>
  </body>
</html>
