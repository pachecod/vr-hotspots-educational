<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Submissions — VR Hotspots Admin</title>
    <link rel="stylesheet" href="admin-nav.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        max-width: 1100px;
      }
      .import-panel {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 24px;
        border: 2px solid #dee2e6;
      }
      .import-panel h2 {
        margin-top: 0;
        color: #495057;
        font-size: 1.1em;
      }
      .import-btn {
        background: #6f42c1;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }
      .import-btn:hover {
        background: #5e37a3;
      }
      #import-status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 5px;
        display: none;
        font-size: 14px;
      }
      .filters {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 16px;
      }
      .submission-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
        background: #fafafa;
      }
      .submission-card h3 {
        margin: 0 0 8px;
      }
      .meta {
        color: #555;
        font-size: 14px;
        line-height: 1.5;
      }
      .note-block {
        margin: 10px 0;
        padding: 10px 12px;
        background: #fff8e1;
        border-left: 4px solid #ffc107;
        border-radius: 4px;
        font-size: 14px;
      }
      .note-block strong {
        display: block;
        margin-bottom: 4px;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .actions button,
      .actions a.btn {
        padding: 8px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        text-decoration: none;
        display: inline-block;
      }
      .btn-download {
        background: #007bff;
        color: #fff;
      }
      .btn-host {
        background: #28a745;
        color: #fff;
      }
      .btn-review {
        background: #6f42c1;
        color: #fff;
      }
      .btn-history {
        background: #6c757d;
        color: #fff;
      }
      .btn-delete {
        background: #dc3545;
        color: #fff;
      }
      .version-history {
        margin-top: 12px;
        padding: 12px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 4px;
        display: none;
      }
      .version-history.open {
        display: block;
      }
      .version-row {
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        font-size: 13px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .badge-submitted {
        background: #d4edda;
        color: #155724;
      }
      .badge-return {
        background: #cce5ff;
        color: #004085;
      }
      .badge-draft {
        background: #e2e3e5;
        color: #383d41;
      }
      .host-result {
        display: none;
        margin: 0 0 20px;
        padding: 12px 16px;
        background: #d4edda;
        border: 1px solid #c3e6cb;
        border-radius: 6px;
        color: #155724;
        font-size: 14px;
        line-height: 1.6;
      }
      .host-result a {
        color: #0b5ed7;
      }
    </style>
    <script src="admin-auth-ui.js"></script>
    <script src="admin-nav.js"></script>
  </head>
  <body>
    <div id="login-root"></div>
    <div id="main-content" style="display: none">
    <nav id="admin-nav" data-active="submissions"></nav>
    <h1>Submissions</h1>

    <div class="import-panel">
      <h2>Import project ZIP</h2>
      <p style="color: #6c757d; margin-bottom: 15px">
        Upload a previously exported VR project ZIP (e.g. from a local export or backup).
      </p>
      <button type="button" class="import-btn" onclick="document.getElementById('import-project-zip-input').click()">
        Import Project ZIP
      </button>
      <input type="file" id="import-project-zip-input" accept=".zip" style="display: none" />
      <div id="import-status"></div>
    </div>

    <div class="filters">
      <label
        >Class:
        <select id="filter-class"><option value="">All classes</option></select></label
      >
      <label
        >Student:
        <select id="filter-student"><option value="">All students</option></select></label
      >
      <label
        >Notes:
        <select id="filter-notes">
          <option value="all">All</option>
          <option value="with_notes">With notes</option>
          <option value="without_notes">Without notes</option>
        </select></label
      >
      <button type="button" id="apply-filters">Apply filters</button>
    </div>

    <div id="inbox-list">Loading submissions...</div>
    </div>

    <script src="admin-submissions.js"></script>
  </body>
</html>
