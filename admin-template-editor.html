<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Template Editor — VR Hotspots Admin</title>
    <link rel="stylesheet" href="admin-nav.css" />
    <link rel="stylesheet" href="vr-hotspots-educational.css" />
    <style>
      body.admin-template-editor-page {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #333;
        --hotspot-editor-panel-width: 0px;
      }
      .admin-template-meta-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 12px;
        padding: 12px 20px;
        background: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
      }
      .admin-template-meta-bar .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 160px;
      }
      .admin-template-meta-bar .field-grow {
        flex: 1;
        min-width: 220px;
      }
      .admin-template-meta-bar label {
        font-size: 12px;
        font-weight: bold;
        color: #555;
      }
      .admin-template-meta-bar input[type='text'],
      .admin-template-meta-bar textarea {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: inherit;
        font-size: 13px;
      }
      .admin-template-meta-bar textarea {
        min-height: 36px;
        resize: vertical;
      }
      .admin-template-flags {
        display: flex;
        gap: 14px;
        align-items: center;
        font-size: 13px;
        padding-bottom: 4px;
      }
      .admin-template-actions {
        display: flex;
        gap: 8px;
        margin-left: auto;
        padding-bottom: 4px;
      }
      .btn {
        padding: 8px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        text-decoration: none;
        display: inline-block;
      }
      .btn-primary { background: #28a745; color: #fff; }
      .btn-secondary { background: #6c757d; color: #fff; }
      #save-status { font-size: 13px; color: #666; align-self: center; }
      body.admin-template-editor-page .flat-page-editor-root {
        top: 118px;
        right: 0;
        left: 0;
      }
      #toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #28a745;
        color: #fff;
        padding: 12px 18px;
        border-radius: 6px;
        display: none;
        z-index: 100100;
      }
    </style>
    <script src="admin-auth-ui.js"></script>
    <script src="admin-nav.js"></script>
    <script>
      window.FLAT_EDITOR_BOOT = { mode: 'admin-template' };
    </script>
    <script src="flat-editor.bundle.js"></script>
  </head>
  <body class="admin-template-editor-page">
    <div id="login-root"></div>
    <div id="main-content" style="display: none">
      <nav id="admin-nav" data-active="templates"></nav>

      <div class="admin-template-meta-bar">
        <div class="field field-grow">
          <label for="tpl-title">Template title</label>
          <input type="text" id="tpl-title" placeholder="e.g. Photo Gallery Starter" />
        </div>
        <div class="field field-grow">
          <label for="tpl-desc">Description</label>
          <textarea id="tpl-desc" rows="1" placeholder="Short description for students"></textarea>
        </div>
        <div class="admin-template-flags">
          <label><input type="checkbox" id="tpl-public" checked /> Public</label>
          <label><input type="checkbox" id="tpl-default" /> Default starter</label>
        </div>
        <div class="admin-template-actions">
          <span id="save-status"></span>
          <a href="admin-templates.html" class="btn btn-secondary">← Back to list</a>
          <button type="button" class="btn btn-primary" id="save-tpl-btn">Save Template</button>
        </div>
      </div>
    </div>
    <div id="toast">Saved!</div>
    <script src="admin-template-editor.js"></script>
  </body>
</html>
