<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Templates — VR Hotspots Admin</title>
    <link rel="stylesheet" href="admin-nav.css" />
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; color: #333; max-width: 960px; }
      .section { margin: 20px 0; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; background: #f8f9fa; }
      .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
      .btn-primary { background: #28a745; color: #fff; }
      .btn-danger { background: #dc3545; color: #fff; }
      .btn-secondary { background: #6c757d; color: #fff; }
      .template-card { background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
      .template-meta { font-size: 12px; color: #666; margin-top: 4px; }
      .create-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      #toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: #fff; padding: 12px 18px; border-radius: 6px; display: none; z-index: 10001; }
    </style>
    <script src="admin-auth-ui.js"></script>
    <script src="admin-nav.js"></script>
  </head>
  <body>
    <div id="login-root"></div>
    <div id="main-content" style="display: none">
      <nav id="admin-nav" data-active="templates"></nav>
      <h1>Project Templates</h1>
      <p style="color: #666">Curate public starter templates students can load in the flat page editor.</p>

      <div class="section">
        <h2>Create Template</h2>
        <p style="color: #666; font-size: 14px; margin-top: 0">
          Use the flat page editor to build HTML, CSS, and JS — same tools students get (Snippets, Format, multi-file, Ridey when enabled).
        </p>
        <div class="create-actions">
          <a href="admin-template-editor.html" class="btn btn-primary">+ Create with Editor</a>
        </div>
      </div>

      <div class="section">
        <h2>Existing Templates</h2>
        <div id="template-list"></div>
      </div>
    </div>
    <div id="toast">Saved!</div>
    <script src="admin-templates.js"></script>
  </body>
</html>
