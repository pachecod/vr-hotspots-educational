<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin — Users</title>
    <link rel="stylesheet" href="admin-nav.css" />
    <link rel="stylesheet" href="admin-asset-browser.css" />
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; max-width: 1100px; }
      .panel { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
      h2 { margin-top: 0; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 8px 10px; border-bottom: 1px solid #eee; text-align: left; }
      button, .btn { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; margin-right: 4px; }
      .btn-primary { background: #007bff; color: #fff; }
      .btn-danger { background: #dc3545; color: #fff; }
      .btn-secondary { background: #6c757d; color: #fff; }
      .btn-peek { background: #17a2b8; color: #fff; }
      input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-right: 8px; }
      .error { color: #dc3545; margin: 10px 0; }
      .success { color: #28a745; margin: 10px 0; }
      #admin-gate { min-height: 200px; }
    </style>
    <script src="admin-auth-ui.js"></script>
    <script src="admin-nav.js"></script>
  </head>
  <body>
    <div id="admin-gate"></div>
    <div id="admin-content" style="display:none;">
      <nav id="admin-nav" data-active="users"></nav>
      <p id="billing-link-wrap" style="display:none;margin:0 0 16px;">
        <a href="admin-billing.html">Class billing &amp; usage</a>
      </p>

      <div id="users-list-view">
        <div class="panel">
          <h2>Classes</h2>
          <div style="margin-bottom:12px;">
            <input type="text" id="new-class-name" placeholder="Class name" />
            <input type="text" id="new-class-desc" placeholder="Description (optional)" />
            <button class="btn-primary" id="add-class-btn">Add Class</button>
          </div>
          <div id="classes-list"></div>
        </div>

        <div class="panel">
          <h2>Students</h2>
          <div style="margin-bottom:12px;">
            <select id="filter-class"></select>
            <input type="text" id="new-student-name" placeholder="Student display name" />
            <input type="text" id="new-student-password" placeholder="Password (optional — auto-generated if blank)" />
            <button class="btn-primary" id="add-student-btn">Add Student</button>
            <button class="btn-secondary" id="export-passwords-btn">Download All Passwords (CSV)</button>
          </div>
          <p style="color:#666;font-size:13px;margin:0 0 12px;">
            Passwords are saved on the server so you can download them later. Use Reset Password for students added before this update.
          </p>
          <div id="students-msg"></div>
          <div id="students-list"></div>
        </div>
      </div>

      <div id="student-peek-view" style="display: none;">
        <button type="button" id="peek-back-btn" class="peek-back-btn">← Back to Users</button>
        <div id="peek-header" class="peek-header"></div>

        <div class="panel">
          <h2>Projects &amp; saves</h2>
          <div id="peek-versions-list">Loading...</div>
        </div>

        <div class="panel">
          <h2>Student assets</h2>
          <div class="tabs" id="peek-category-tabs"></div>
          <div id="peek-asset-list"></div>
        </div>
      </div>
    </div>

    <div id="peek-preview-modal">
      <div class="panel">
        <button type="button" class="close" id="peek-preview-close" aria-label="Close">&times;</button>
        <h3 id="peek-preview-title"></h3>
        <div id="peek-preview-body"></div>
        <p style="margin-top: 12px; font-size: 12px; word-break: break-all" id="peek-preview-url"></p>
        <button type="button" id="peek-preview-copy-btn" class="btn-copy" style="margin-top: 8px">Copy URL</button>
      </div>
    </div>

    <div id="peek-toast">Copied!</div>

    <script src="common-assets-preview.js"></script>
    <script src="admin-users.js"></script>
    <script src="admin-user-peek.js"></script>
  </body>
</html>
