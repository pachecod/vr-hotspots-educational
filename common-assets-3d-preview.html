<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Preview</title>
    <script src="./node_modules/aframe/dist/aframe-v1.7.1.min.js"></script>
    <script src="common-assets-3d-aframe.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ececec;
      }
      #status,
      #error {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        padding: 16px;
        text-align: center;
        font-family: Arial, sans-serif;
        color: #666;
        background: rgba(236, 236, 236, 0.92);
        z-index: 2;
      }
      #status {
        display: flex;
      }
      .a-enter-vr {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading 3D model…</div>
    <div id="error">Unable to load 3D model.</div>

    <a-scene embedded scene-optimizer id="preview-scene" style="width: 100%; height: 100%">
      <a-entity id="model-entity" position="0 1.2 -2" scale="1 1 1" enhanced-model-handler></a-entity>
      <a-sky color="#ECECEC"></a-sky>
      <a-camera id="preview-camera" position="0 1.6 3" enhanced-camera-controls></a-camera>
      <a-light type="ambient" intensity="0.4" color="#ffffff"></a-light>
      <a-light type="directional" intensity="0.8" color="#ffffff" position="0 10 5"></a-light>
      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#cccccc"></a-plane>
    </a-scene>

    <script>
      (function () {
        const rawUrl = new URLSearchParams(window.location.search).get('url');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const modelEl = document.getElementById('model-entity');

        function showError(detail) {
          if (detail) console.error('3D preview error:', detail);
          statusEl.style.display = 'none';
          errorEl.style.display = 'flex';
          document.getElementById('preview-scene').style.display = 'none';
        }

        function hideStatus() {
          statusEl.style.display = 'none';
        }

        if (!rawUrl) {
          showError('Missing model URL');
          return;
        }

        const modelUrl = new URL(rawUrl, window.location.href).href;
        modelEl.setAttribute('gltf-model', modelUrl);
        modelEl.addEventListener('model-loaded', hideStatus, { once: true });
        modelEl.addEventListener('model-error', function (evt) {
          showError(evt && evt.detail);
        }, { once: true });
      })();
    </script>
  </body>
</html>
