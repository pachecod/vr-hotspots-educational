<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Preview</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ececec;
      }
      model-viewer {
        width: 100%;
        height: 100%;
        background: #ececec;
      }
      #status,
      #error {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        padding: 16px;
        text-align: center;
        font-family: Arial, sans-serif;
        color: #666;
        background: rgba(236, 236, 236, 0.92);
        z-index: 2;
      }
      #status {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading 3D model…</div>
    <div id="error">Unable to load 3D model.</div>
    <model-viewer
      id="viewer"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      exposure="1"
      alt="3D model preview"
    ></model-viewer>

    <script>
      (function () {
        const rawUrl = new URLSearchParams(window.location.search).get('url');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const viewer = document.getElementById('viewer');

        function showError(detail) {
          if (detail) console.error('3D preview error:', detail);
          statusEl.style.display = 'none';
          errorEl.style.display = 'flex';
        }

        function hideStatus() {
          statusEl.style.display = 'none';
        }

        if (!rawUrl) {
          showError('Missing model URL');
          viewer.style.display = 'none';
          return;
        }

        const modelUrl = new URL(rawUrl, window.location.href).href;
        viewer.src = modelUrl;

        viewer.addEventListener('load', hideStatus, { once: true });
        viewer.addEventListener('error', function (evt) {
          showError(evt && evt.detail);
        }, { once: true });
      })();
    </script>
  </body>
</html>
