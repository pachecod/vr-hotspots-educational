# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: vr-hotspots-educational
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      # Optional — app resolves bucket by name if omitted or invalid
      # - key: B2_BUCKET_ID
      #   sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
