<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newhouse 60th Anniversary</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Newhouse School — 60th Anniversary</h1>
      <p>
        Walk through 360° video scenes from the celebration. Open the immersive viewer below, or
        switch to <strong>Spherical</strong> in the editor to edit scenes and hotspots.
      </p>

      <img
        class="featured-photo"
        src="../../images/test_1781807245534.png"
        alt="Donald Newhouse with student Nada Merghani at the 60th anniversary celebration"
      />

      <!-- 360° VR tour from this project (Spherical Content) -->
      <style>
        .vr-tour-embed {
          margin: 1.5rem auto;
          max-width: 100%;
          text-align: center;
        }
        .vr-tour-embed iframe {
          width: 100%;
          min-height: 480px;
          height: 70vh;
          border: 0;
          display: block;
          border-radius: 8px;
          background: #111;
        }
      </style>
      <div class="vr-tour-embed" data-vr-tour-embed="1" data-vr-tour-url="../../index.html">
        <iframe
          src="../../index.html"
          title="Newhouse 60th Anniversary 360° Tour"
          allow="fullscreen; vr; accelerometer; gyroscope"
        ></iframe>
      </div>
    </main>
  </body>
</html>
